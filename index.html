<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Actions CI/CD Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            padding:40px;
            border-radius:15px;
            width:500px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            font-size:40px;
            margin-bottom:20px;
        }

        h2{
            color:#22c55e;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            margin:10px 0;
            line-height:1.6;
        }

        .badge{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#22c55e;
            color:white;
            border-radius:30px;
            font-weight:bold;
        }

        footer{
            margin-top:30px;
            font-size:14px;
            color:#ddd;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🚀 Deployment Successful</h1>

    <h2>GitHub Actions → Amazon S3</h2>

    <p>Your CI/CD pipeline is working successfully.</p>

    <p>This website was automatically deployed using GitHub Actions.</p>

    <div class="badge">
        ✅ Build Status: SUCCESS
    </div>

    <footer>
        <p>DevOps Demo Project</p>
        <p>Hosted on Amazon S3</p>
    </footer>

</div>

</body>
</html>
